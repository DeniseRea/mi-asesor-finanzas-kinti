services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: kinti
      POSTGRES_PASSWORD: kinti123
      POSTGRES_DB: kinti_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kinti -d kinti_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://kinti:kinti123@postgres:5432/kinti_dev"
      JWT_SECRET: "kinti-dev-secret-key-hackathon"
      PORT: "3001"
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  pgdata:
